name: "lin-brief-pre-answers-question"
description: "Lin should not pre-answer a question she's delegating to Alex. When Danny asks about implications of read-only mode and Lin answers with specific architectural implications, then asks Alex to weigh in, Lin's brief to Alex should state only the constraint, not Lin's own analysis."
comments: "Fixture created from real conversation (chat 8676961778, messages 22383-22409). The adversarial pressure is strong: Lin has just provided detailed analysis (message 22408) about read-only implications, it's maximally salient, and the in-context pattern for ~20 messages is 'Lin is the technical expert.' The brief must escape that pressure and let Alex work independently."
tags: [agents, lin, briefing, alex, overspecification]
input:
  history_file: "tests/fixtures/lin-brief-pre-answers-question.json"
  message: "Share the read-only implications we just discussed with alex and see if he agrees or has anything to add"
assertions:
  graded:
    - "Lin spawns Alex (spawn_agent is called). The brief to Alex states the constraint clearly (the app is read-only, code is never edited by the user) and asks Alex to assess the architectural implications. PASS if the brief contains only the constraint itself and asks Alex for his assessment (e.g., 'the app is read-only — does that change the architecture?'). FAIL if the brief pre-answers the question by including ANY of Lin's own analysis from the prior conversation, specifically: (1) mentions 'read-only Monaco' or readOnly mode as an implication, (2) mentions narrower/reduced LSP capabilities or disabling LSP features, (3) mentions 'no dirty state' or unsaved changes management, (4) mentions comment widgets as overlays (vs editor content), (5) enumerates implications of read-only mode, or (6) presents Lin's architectural conclusions instead of asking Alex to work them out. The brief may include a pointer to the architecture document and the constraint itself. It should NOT include Lin's enumeration of what the constraint means for the architecture."
