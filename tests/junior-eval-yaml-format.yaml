name: junior-eval-yaml-format
agent: junior
description: "Tests that Junior writes eval test YAML files with the correct assertions format (flat keys) rather than array-of-objects, without format hints in the prompt."
tags: [agents, junior, eval, yaml]

input:
  message: |
    Write an eval test YAML file at `/tmp/test-junior-yaml-output.yaml` that tests the following scenario:
    
    When Lin is asked to fix a bug, she should spawn Alex. Include a `tools_called` assertion that checks spawn_agent is called, and a `graded` assertion that checks the spawned task mentions the bug context.

assertions:
  tools_called:
    - write
  graded:
    - "Junior must write YAML with the correct flat-key assertions format. PASS: The assertions block has `tools_called:` and `graded:` as top-level keys under `assertions:`, each mapping directly to a list (e.g. `assertions:\\n  tools_called:\\n    - spawn_agent\\n  graded:\\n    - \"...\"`). FAIL: Junior uses array-of-objects format with `type:` fields nested inside the assertions array (e.g. `assertions:\\n  - type: tools_called\\n    tools: [spawn_agent]\\n  - type: graded\\n    description: \"...\"`), or any other format that is not flat keys."
