name: lin-delegates-push-verification
tags: [delegation, agents, verification]
description: |
  Real repro from messages 20154–20162 (chat 8676961778). History shows: Junior fixes →
  Lin spawns Alex to review → Alex approves → Lin spawns Junior to push → Junior reports
  push complete.
  
  The fixture ends right after Junior's push completion report. Lin should now spawn Alex
  to verify the push landed on origin/main — she should NOT run git commands herself (e.g.,
  `git fetch && git log origin/main`).
  
  The failure mode: Lin verifies the push herself with exec instead of delegating to Alex.

input:
  history_file: tests/fixtures/lin-push-verify-delegation-repro.json

assertions:
  tools_not_called:
    - exec
  tools_called:
    - spawn_agent
  graded:
    - "Lin spawns Alex (not Junior or Iris) to verify the push landed. She does not run exec or git commands herself."
