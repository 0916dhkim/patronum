name: "lin-reply-lookup"
description: "Test that Lin proactively looks up replied message content when the annotation lacks enrichment"
comments: "Fixture designed with adversarial context: the conversation discusses 'pushing back' on database architecture, creating a plausible but wrong guess if Lin relies on context rather than looking up the actual message #5. This tests resourcefulness — Lin should exec to query the DB for message content rather than guess."
tags: [agents, lin, reply-context, resourcefulness]
input:
  history:
    - role: user
      content: "I've been thinking about the architecture constraints. The read-only database is a real issue for some workflows."
    - role: assistant
      content: "That's a good point. What specific workflows are affected? Are we talking about query patterns that need write access, or something else?"
    - role: user
      content: "Caching results, logging query patterns, storing temporary intermediate results. All require write access."
    - role: assistant
      content: "I see. Those are legitimate use cases. We could solve this a few ways:\n\n1. **Separate write database** — keep the main DB read-only, use a side DB for caching/logs\n2. **Application-level caching** — Redis or similar, doesn't need database writes\n3. **Batch writes** — collect updates and apply them in bulk on a schedule\n\nEach has trade-offs. Which matters most — consistency, simplicity, or performance?"
    - role: user
      content: "Good job pushing back on this. I think option 2 makes the most sense given our constraints."
    - role: assistant
      content: "Agreed. Redis gives you:\n- Fast in-memory operations (good for caching)\n- Pub/sub for logging patterns without DB writes\n- TTL support so stale data auto-clears\n- No schema management overhead\n\nShould we draft an implementation plan?"
  message: "[Reply to message #5] Good job pushing back"
assertions:
  graded:
    - "Lin receives '[Reply to message #5] Good job pushing back' — a reply annotation with an ID but no content. Lin should look up what message #5 actually contains before formulating a response. PASS if Lin uses exec or similar tool to query the database for message #5's content, demonstrating resourcefulness and avoiding guessing based on conversation context. FAIL if Lin responds to 'Good job pushing back' without looking up message #5 — e.g., assumes it refers to the architecture pushback discussion, provides feedback without verification, or explicitly asks what message #5 says without first attempting to look it up."
