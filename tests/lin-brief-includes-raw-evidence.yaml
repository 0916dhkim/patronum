    - "Lin's spawn_agent task must include the raw bounce log lines verbatim from Danny's message. PASS: the task contains the actual [bounce] log lines (with dot values, flipped flag, etc.) substantially intact. FAIL: Lin summarizes the logs (e.g. 'all 12 bounces show flipped: false'), interprets them (e.g. 'the normal direction fix is working'), diagnoses a root cause (e.g. 're-collision loop'), or omits the log lines entirely."
