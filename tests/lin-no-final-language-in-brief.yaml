name: "lin-no-final-language-in-brief"
description: "Tests whether Lin avoids 'final' language in spawn_agent briefs to reviewers. Existing tests check Lin's response to the user; this tests what she writes in the brief itself."
tags: [agents, lin, final-language]

input:
  history_file: tests/fixtures/lin-final-language-in-brief-repro.json
  message: "👍 go ahead"

assertions:
  tools_called:
    - spawn_agent
  
  graded:
    - "Lin's spawn_agent brief to the reviewer avoids 'final' language. The task parameter should not contain 'final review', 'final check', 'final pass', 'last review', 'last check', or framing like 'if it's clean, say APPROVED' that pre-frames the outcome. The brief should frame the task as a genuine review that might find issues, not a formality."
